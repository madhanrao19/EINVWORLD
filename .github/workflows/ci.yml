name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EINVWORLD.sln

      - name: Build
        run: dotnet build EINVWORLD.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EINVWORLD.sln --configuration Release --no-build --verbosity normal
