name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EINVWORLD.sln

      - name: Build
        run: dotnet build EINVWORLD.sln --configuration Release --no-restore

      # windows-latest ships SQL Server Express LocalDB; start the default instance so the integration
      # tests run against a real SQL Server. If it's unavailable the tests no-op (see SqlServerFixture).
      - name: Start SQL Server LocalDB (integration tests)
        shell: pwsh
        run: |
          sqllocaldb start MSSQLLocalDB
          sqllocaldb info MSSQLLocalDB

      - name: Test
        env:
          INTEGRATION_SQLSERVER: 'Server=(localdb)\MSSQLLocalDB;Trusted_Connection=True;TrustServerCertificate=True;'
        run: dotnet test EINVWORLD.sln --configuration Release --no-build --verbosity normal

      # Produce a deployable build only for main (the deploy source) so feature-branch CI stays fast.
      # The artifact carries no secrets: repo appsettings*.json ship with empty secret fields — real
      # values live in the server's env vars / web.config, which are NOT in the repo or this output.
      - name: Publish (main only)
        if: github.ref == 'refs/heads/main'
        run: dotnet publish EINVWORLD.csproj --configuration Release --output publish

      - name: Upload deployable artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: einvworld-app
          path: publish
          retention-days: 30
