name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly sweep catches new CodeQL query-pack rules against unchanged code, not just new PRs.
    - cron: "23 3 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # security-extended adds broader query coverage beyond the default security-quality set.
          queries: security-extended

      # C# is a compiled language — CodeQL needs an actual build to trace through, not just a checkout.
      - name: Restore
        run: dotnet restore EINVWORLD.sln

      - name: Build
        run: dotnet build EINVWORLD.sln --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
